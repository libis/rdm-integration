# Reverse proxy for the dataverse-frontend SPA in dev. Listens on :80
# inside the container (published as :8000 on the host by compose).
#
# Routing strategy: same-origin SPA + Dataverse so the browser does
# not see cross-origin XHR for /api/* calls (no CORS preflight, no
# Access-Control-Allow-Origin maintenance burden, cookies just work).
#   /modern  -> modern_frontend:5173  (Vite dev server, with HMR WS)
#   /        -> dataverse:8080        (JSF + REST API + bundled
#                                      reusable components)
#
# Vite's HMR client connects back via WebSocket. The Vite config
# (dev-env/vite.config.ts) sets server.hmr.clientPort = 8000, so the
# browser dials ws://localhost:8000/modern and we upgrade the
# connection upstream to modern_frontend:5173.

events {}

http {
  client_max_body_size 20M;

  server {
    listen 80;
    server_name localhost;

    # Vite dev server for the IQSS dataverse-frontend SPA.
    location /modern {
      proxy_pass http://modern_frontend:5173;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $http_host;
    }

    # Everything else: Dataverse JSF + API. Keeping this last so the
    # /modern location wins for SPA traffic.
    location / {
      proxy_pass http://dataverse:8080;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header X-Forwarded-Port  $server_port;
    }
  }
}
