name: tests

# Runs `make test` on every commit, on the rdm-ci self-hosted runner.
on:
  push:

permissions:
  contents: read
  issues: write

concurrency:
  # Coalescing debounce: <=1 running + <=1 pending per branch — a newer commit
  # supersedes the pending run, the running one finishes.
  group: tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: libis/rdm-ci/.github/workflows/make-target.yml@main
    with:
      make-target: test
    secrets: inherit
